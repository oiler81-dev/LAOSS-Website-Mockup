<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Location | LA Orthos</title>
  <meta name="description" content="Modern orthopedic website for Los Angeles Orthopedic Surgery Specialists with providers, services, locations, and contact information.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body data-page="location">
<div id="site-chrome"></div>

<main>
  <section class="page-hero">
    <div class="container page-hero-shell">
      <div class="page-hero-inner">
        <div>
          <div class="eyebrow">Clinic location</div>
          <h1 id="location-name">Location name</h1>
          <p id="location-summary">Location summary</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:18px">
            <a class="btn btn-primary" target="_blank" rel="noopener" href="https://www.zocdoc.com/practice/los-angeles-orthopedic-surgery-specialists-86604?lock=true&isNewPatient=false&referrerType=widget">Book here</a>
            <a class="btn btn-ghost" href="locations.html">Back to locations</a>
          </div>
        </div>
        <div class="hero-side-card">
          <img id="location-image" src="" alt="" style="width:100%;height:320px;object-fit:cover;border-radius:24px">
        </div>
      </div>
    </div>
  </section>
  <section class="section">
    <div class="container split">
      <div class="panel">
        <div class="item"><strong>Address</strong><p id="location-address"></p></div>
        <div class="item"><strong>Phone</strong><p><a id="location-phone" href="#"></a></p></div>
        <div class="item"><strong>Fax</strong><p id="location-fax"></p></div>
        <div class="item"><strong>Hours</strong><p id="location-hours"></p></div>
      </div>
      <div class="panel" style="padding:0;overflow:hidden">
        <iframe id="location-map" class="map-embed" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
  </section>
  <section class="section alt">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Other clinics</div>
        <h2>More locations near Los Angeles.</h2>
      </div>
      <div id="other-locations" class="grid-4"></div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="assets/data.js"></script>
<script src="assets/script.js"></script>
</body>
</html>
